<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공지사항 게시판</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2e3a;
    --text: #e6e6e9;
    --muted: #8b8f9c;
    --accent: #7c5cff;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 22px; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .form-card { padding: 20px; }
  input, textarea {
    width: 100%;
    background: #11131a;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary { background: transparent; color: var(--muted); }
  button.danger { background: transparent; color: var(--danger); }
  .row { display: flex; gap: 8px; justify-content: flex-end; }
  .announcement-title { font-size: 16px; font-weight: 600; margin: 0 0 6px; }
  .announcement-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .announcement-content { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>공지사항 게시판</h1>

  <div class="card form-card">
    <input id="title" placeholder="제목" />
    <textarea id="content" placeholder="내용"></textarea>
    <input id="author" placeholder="작성자 (선택)" />
    <div class="row">
      <button onclick="createAnnouncement()">등록</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
  const API = "/api/announcements";

  async function loadAnnouncements() {
    const res = await fetch(API);
    const items = await res.json();
    const list = document.getElementById("list");

    if (!items.length) {
      list.innerHTML = '<div class="empty">등록된 공지사항이 없습니다.</div>';
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="card">
        <p class="announcement-title">${escapeHtml(item.title)}</p>
        <p class="announcement-meta">${escapeHtml(item.author || "익명")} · ${new Date(item.created_at).toLocaleString("ko-KR")}</p>
        <p class="announcement-content">${escapeHtml(item.content)}</p>
        <div class="row">
          <button class="danger" onclick="deleteAnnouncement('${item.id}')">삭제</button>
        </div>
      </div>
    `).join("");
  }

  async function createAnnouncement() {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const author = document.getElementById("author").value.trim();

    if (!title || !content) {
      alert("제목과 내용을 입력해주세요.");
      return;
    }

    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content, author: author || null }),
    });

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    document.getElementById("author").value = "";
    loadAnnouncements();
  }

  async function deleteAnnouncement(id) {
    if (!confirm("삭제하시겠습니까?")) return;
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadAnnouncements();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str ?? "";
    return div.innerHTML;
  }

  loadAnnouncements();
</script>
</body>
</html>
